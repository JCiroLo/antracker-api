name: Build Production Branch

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Deploy compiled files to production branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # temporally save compiled files
          mkdir /tmp/build-output
          cp -R dist/* /tmp/build-output/

          # change branch
          git checkout --orphan production

          # remove all files
          git rm -rf .

          # clean up previous build
          find . -mindepth 1 -maxdepth 1 \
            ! -name '.git' \
            ! -name '.' \
            -exec rm -rf {} \;

          # restore compiled files
          cp -R /tmp/build-output/* .

          # commit and push
          git add .
          git commit -m "Auto build from main" || echo "No changes to commit"
          git push origin production --force