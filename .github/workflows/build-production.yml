name: Build Production Branch

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm build

      - name: Deploy to production branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          mkdir -p /tmp/build-output
          cp -R dist/* /tmp/build-output/
          cp package.json /tmp/build-output/
          cp pnpm-lock.yaml /tmp/build-output/

          git checkout production || git checkout -b production

          git rm -rf .
          
          cp -R /tmp/build-output/* .

          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Build: auto-generated from main (${{ github.sha }})"
            git push origin production --force
          fi